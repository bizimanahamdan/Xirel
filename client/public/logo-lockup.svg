<svg width="340" height="90" viewBox="0 0 340 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="xirelGemGradientLockup" x1="5" y1="5" x2="85" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f81f58" />
      <stop offset="1" stop-color="#ff6d84" />
    </linearGradient>
    <radialGradient id="xirelGlossLockup" cx="0.32" cy="0.26" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="xirelTextGradient" x1="95" y1="20" x2="330" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f81f58" />
