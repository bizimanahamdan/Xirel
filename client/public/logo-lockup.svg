    <circle cx="50" cy="50" r="48" fill="url(#xirelGlossLockup)" />
    <circle cx="50" cy="50" r="45.5" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5" />
    <polyline
