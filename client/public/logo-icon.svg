<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="xirelGemGradient" x1="14" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f81f58" />
      <stop offset="1" stop-color="#ff6d84" />
    </linearGradient>
    <radialGradient id="xirelGloss" cx="0.32" cy="0.26" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Badge -->
  <circle cx="50" cy="50" r="48" fill="url(#xirelGemGradient)" />
  <circle cx="50" cy="50" r="48" fill="url(#xirelGloss)" />
  <circle cx="50" cy="50" r="45.5" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5" />

  <!-- Bolt: electronics, the "\" stroke of the X -->
  <polyline
    points="30,22 62,45 42,45 72,80"
    fill="none"
    stroke="#ffffff"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Ribbon: fashion/outfits, the "/" stroke of the X -->
  <path
    d="M 72 22 C 55 38 63 55 40 58 C 30 60 32 70 28 80"
    fill="none"
    stroke="#ffe3bc"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
